name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen --extra dev --extra parsers

      - name: Check dependency consistency
        run: uv pip check

      - name: Run test suite
        run: uv run pytest -q

      - name: Run acceptance eval gate
        env:
          MEMCO_LLM_API_KEY: ci-placeholder-key
          MEMCO_API_TOKEN: ci-placeholder-token
          MEMCO_BACKUP_PATH: ${{ github.workspace }}/var/backups/memco-postgres.dump
        run: |
          mkdir -p "$(dirname "$MEMCO_BACKUP_PATH")"
          : > "$MEMCO_BACKUP_PATH"
          uv run python - <<'PY'
          import json
          from pathlib import Path
          from memco.release_check import run_release_check

          result = run_release_check(
              project_root=Path.cwd(),
              include_pytest=False,
              include_eval=True,
          )
          print(json.dumps(result, ensure_ascii=False, indent=2))
          if not result["ok"]:
              raise SystemExit(1)
          PY
